version: '3.9'

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youtube-factory-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AzureOpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT}
      - AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY}
      - AzureOpenAI__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AzureSearch__Endpoint=${AZURE_SEARCH_ENDPOINT:-}
      - AzureSearch__ApiKey=${AZURE_SEARCH_API_KEY:-}
      - AllowedOrigin=http://localhost:4200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - factory-net
    restart: unless-stopped

  # ── Angular Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youtube-factory-frontend
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - factory-net
    restart: unless-stopped

  # ── Redis (for production session store) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: youtube-factory-redis
    ports:
      - "6379:6379"
    networks:
      - factory-net
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  factory-net:
    driver: bridge
